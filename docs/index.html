<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FalconNest DXF nesting</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="workspace" aria-label="Nesting workspace">
        <header class="toolbar">
          <div class="brand">
            <span class="mark" aria-hidden="true"></span>
            <div>
              <h1>FalconNest</h1>
              <p>Static DXF nesting for browser-based laser and CNC layouts.</p>
            </div>
          </div>
          <div class="actions">
            <label class="file-button">
              <input id="file-input" type="file" accept=".dxf" multiple />
              Import DXF
            </label>
            <button id="nest-button" type="button">Nest</button>
            <button id="save-dxf" type="button" disabled>Save DXF</button>
            <button id="save-svg" type="button" disabled>Save SVG</button>
          </div>
        </header>

        <section class="controls" aria-label="Sheet controls">
          <label>
            Sheet width
            <input id="sheet-width" type="number" min="1" step="1" value="1200" />
          </label>
          <label>
            Sheet height
            <input id="sheet-height" type="number" min="1" step="1" value="600" />
          </label>
          <label>
            Spacing
            <input id="spacing" type="number" min="0" step="0.1" value="3" />
          </label>
          <label>
            Rotation step
            <input id="rotation-step" type="number" min="1" max="360" step="1" value="1" />
          </label>
          <label>
            Units
            <select id="units">
              <option value="mm">mm</option>
              <option value="inch">inch</option>
            </select>
          </label>
          <label>
            Copies per file
            <input id="copies" type="number" min="1" step="1" value="1" />
          </label>
        </section>

        <section class="statusbar" aria-live="polite">
          <span id="status">Import one or more DXF files to begin.</span>
          <span id="summary"></span>
        </section>

        <section class="stage-wrap">
          <svg id="stage" role="img" aria-label="Nesting preview"></svg>
        </section>
      </section>

      <aside class="sidebar" aria-label="Imported parts">
        <div class="panel-head">
          <h2>Parts</h2>
          <button id="clear-button" type="button">Clear</button>
        </div>
        <ol id="parts-list"></ol>
      </aside>
    </main>

    <script src="app.js"></script>
  </body>
</html>
